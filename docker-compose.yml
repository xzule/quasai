services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list 2>&1 | grep -q phi4-mini"]
      interval: 30s
      retries: 6
      start_period: 120s
    entrypoint: >
      sh -c "ollama serve > /dev/null 2>&1 &
      sleep 10 &&
      ollama pull phi4-mini &&
      wait"

  app:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./input:/input
      - ./output:/output
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  ollama_data: