services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      retries: 3
      start_period: 40s
    entrypoint: >
      sh -c "ollama serve &
      sleep 10 &&
      ollama pull phi4-mini &&
      wait"

  app:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./input:/input
      - ./output:/output
    entrypoint: ["tail", "-f", "/dev/null"]